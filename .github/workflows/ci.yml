# PR checks — merge blocked on red (docs/02_TRD.md §13, docs/12 §1).
name: ci
on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -e "backend/[dev]"
      - run: ruff check backend/app backend/tests
      - run: mypy backend/app
      - name: Unit + component tests (emulator-first, docs/12 §2)
        run: |
          gcloud emulators firestore start --host-port=localhost:8686 &
          export FIRESTORE_EMULATOR_HOST=localhost:8686
          pytest backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: frontend/package.json }
      - run: npm ci
      - run: npm run lint          # includes no-raw-colors + i18n key lint (docs/09)
      - run: npm run typecheck
      - run: npm test

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.8.*" }
      - run: terraform -chdir=infra/terraform init -backend=false
      - run: terraform -chdir=infra/terraform validate
      - uses: terraform-linters/setup-tflint@v4
      - run: tflint --chdir=infra/terraform

  prompt-evals:
    # Smoke subset on PR; full nightly + on prompt changes (docs/06 §8, docs/12 §7)
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions: { id-token: write, contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.EVAL_SA }}
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install -e "backend/[dev]"
      - run: pytest backend/tests/evals -q -m smoke
