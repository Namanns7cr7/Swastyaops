# Cloud Build — build, test, push, deploy (docs/10_Deployment_Guide.md §4–5).
# Triggered by GitHub Actions via Workload Identity Federation (no SA keys).
# Substitutions: _ENV (dev|staging|prod), SHORT_SHA (git).

substitutions:
  _ENV: dev
  _REGION: asia-south1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - id: test
    name: python:3.12-slim
    dir: backend
    entrypoint: bash
    args: ["-c", "pip install -e '.[dev]' -q && ruff check app && pytest tests/unit -q"]

  - id: prepare-prompts
    name: gcr.io/cloud-builders/git
    entrypoint: bash
    args: ["-c", "cp -r prompts backend/prompts"]
    waitFor: [test]

  - id: build-image
    name: gcr.io/cloud-builders/docker
    dir: backend
    args:
      - build
      - --tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/services/backend:git-${SHORT_SHA}
      - .
    waitFor: [prepare-prompts]

  - id: push
    name: gcr.io/cloud-builders/docker
    args: [push, "${_REGION}-docker.pkg.dev/$PROJECT_ID/services/backend:git-${SHORT_SHA}"]
    waitFor: [build-image]

  # One image, six services — SERVICE env selects the ASGI app (backend/Dockerfile).
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        declare -A APPS=( [svc-api]="app.main:app" [svc-ingestion]="app.ingestion.main:app" \
          [svc-agents]="app.agents.main:app" [svc-forecast]="app.forecast.main:app" \
          [svc-notify]="app.notify.main:app" [svc-reports]="app.reports.main:app" )
        for SVC in "$${!APPS[@]}"; do
          EXTRA=""
          if [[ "${_ENV}" != "dev" ]]; then EXTRA="--no-traffic --tag=canary"; fi
          gcloud run deploy "$$SVC" \
            --image="${_REGION}-docker.pkg.dev/$PROJECT_ID/services/backend:git-${SHORT_SHA}" \
            --region="${_REGION}" --command=python \
            --args="-m,uvicorn,$${APPS[$$SVC]},--host,0.0.0.0,--port,8080" \
            $$EXTRA --quiet &
        done
        wait
    waitFor: [push]

  - id: smoke
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args: ["-c", "pip3 install httpx -q && python3 scripts/smoke_test.py --project $PROJECT_ID --level smoke"]
    waitFor: [deploy]

  # staging/prod: canary 10% for 30 min, auto-promote or rollback (docs/02 §13).
  # Promotion is a separate build step invoked by the deploy workflow after the soak
  # window, reading SLO burn from Cloud Monitoring (scripts/canary_promote.sh).

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/services/backend:git-${SHORT_SHA}
